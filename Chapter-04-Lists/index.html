<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types</title>
</head>

<body>

    <h1>types of lists</h1>
    <hr>
    <h2>unorder list</h2>
    <ul>
        <li>fruits</li>
        <li>vegitables</li>
        <li>rice</li>
    </ul>
    <hr>
    <h2>order list</h2>
    <ol>
        <li>kowshik</li>
        <li>anitha</li>
        <li>mohan</li>
    </ol>
    <hr>
    <h2>description list</h2>
    <dl>
        <dt>Html</dt>
        <dd>html stands for hyper text markup languages</dd>
    </dl>
    <hr>
    <h2>nested list</h2>
    <ul>
        <li>fruits</li>
        <li>rice
            <ol>
                <li>red rice</li>
                <li>brown rice</li>
            </ol>
        </li>


    </ul>


</body>

</html>
