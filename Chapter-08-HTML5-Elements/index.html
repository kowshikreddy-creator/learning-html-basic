<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> html5 elements</title>
</head>
<body>

    <h2>Html5 elements</h2>
    <hr>
    <h2>About details tag</h2>
    <hr>

    <details>

        <summary>what is html</summary>
        <p>
            html stands for hyper text markup language
        </p>
 

    </details>
    <hr>
    <h2>figure tag</h2>
    <figure>
       
        <img  width="200"src="https://images.pexels.com/photos/32196368/pexels-photo-32196368.jpeg"alt="lion">

        <figcaption>Lion-king of jungle</figcaption>




    </figure>
    <hr>
    <h2>About the progress</h2>
    <progress value="60" max="100"></progress>

    <hr>
    <h2>About the meter tag</h2>
    <meter value="100" min="0" max="100"></meter>

    
</body>
</html>
